name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/e-learning

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Updating backend ==="
            cd backend
            mkdir -p uploads extensions snapshots
            chown -R 1000:1000 uploads extensions snapshots

            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --build

            echo "=== Waiting for Directus and AI API ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8055/server/health >/dev/null 2>&1 && curl -sf http://localhost:8090/v1/health >/dev/null 2>&1; then
                echo "Directus and AI API are healthy!"
                exit 0
              fi
              sleep 4
            done
            echo "ERROR: Service health check failed"
            docker compose -f docker-compose.deploy.yml logs directus --tail=20
            docker compose -f docker-compose.deploy.yml logs ai-api --tail=20
            exit 1
