name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Detect which parts changed
  # ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────
  # Backend → VPS via SSH
  # ──────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/e-learning

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Updating backend ==="
            cd backend
            mkdir -p uploads extensions snapshots
            chown -R 1000:1000 uploads extensions snapshots

            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d

            echo "=== Waiting for Directus ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8055/server/health >/dev/null 2>&1; then
                echo "Directus is healthy!"
                exit 0
              fi
              sleep 4
            done
            echo "ERROR: Directus not healthy"
            docker compose -f docker-compose.deploy.yml logs directus --tail=20
            exit 1

  # ──────────────────────────────────────────
  # Frontend → Vercel
  # ──────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
