<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brown outer skin -->
  <circle cx="16" cy="16" r="16" fill="#7B4F2E"/>
  <!-- Green flesh -->
  <circle cx="16" cy="16" r="13" fill="#4CAF50"/>
  <!-- Lighter inner green -->
  <circle cx="16" cy="16" r="8.5" fill="#76D44A"/>

  <!-- White radiating section lines (between seeds, at 22.5° offsets) -->
  <g stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.4">
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(22.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(67.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(112.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(157.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(202.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(247.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(292.5 16 16)"/>
    <line x1="16" y1="16" x2="16" y2="3.5" transform="rotate(337.5 16 16)"/>
  </g>

  <!-- Seeds (8 seeds at radius 10.5 from center) -->
  <g fill="#1A0800">
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(0 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(45 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(90 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(135 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(180 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(225 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(270 16 16)"/>
    <ellipse cx="16" cy="5.5" rx="1.2" ry="1.9" transform="rotate(315 16 16)"/>
  </g>

  <!-- Cream center core -->
  <circle cx="16" cy="16" r="3.2" fill="#F0E2B0"/>
  <circle cx="16" cy="16" r="1.6" fill="#D8C070"/>
</svg>
