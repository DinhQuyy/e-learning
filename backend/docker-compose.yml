services:
  database:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: elearning
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d elearning"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elearning-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elearning-network

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - elearning-network

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: "5432"
      DB_DATABASE: elearning
      DB_USER: directus
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000"
      CORS_CREDENTIALS: "true"
      WEBSOCKETS_ENABLED: "true"
      PUBLIC_URL: "http://localhost:8055"
      REFRESH_TOKEN_COOKIE_SECURE: "false"
      REFRESH_TOKEN_COOKIE_SAME_SITE: "lax"
      EMAIL_TRANSPORT: "smtp"
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SMTP_HOST: "smtp.gmail.com"
      EMAIL_SMTP_PORT: "587"
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_SMTP_SECURE: "false" # STARTTLS on port 587
      PASSWORD_RESET_URL_ALLOW_LIST: "http://localhost:3000/reset-password"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./snapshots:/directus/snapshots
    networks:
      - elearning-network

  ai-api:
    build:
      context: .
      dockerfile: Dockerfile.ai-api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      APP_ENV: development
      PG_HOST: database
      PG_PORT: "5432"
      PG_DB: elearning
      PG_USER: directus
      PG_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      AI_INTERNAL_KEY: ${AI_INTERNAL_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL}
      LLM_MAX_TOKENS_HELPDESK: ${LLM_MAX_TOKENS_HELPDESK:-320}
      LLM_MAX_TOKENS_REFERENCES: ${LLM_MAX_TOKENS_REFERENCES:-360}
      LLM_MAX_TOKENS_MENTOR: ${LLM_MAX_TOKENS_MENTOR:-260}
      LLM_MAX_TOKENS_ASSIGNMENT: ${LLM_MAX_TOKENS_ASSIGNMENT:-320}
      LLM_MAX_TOKENS_REPAIR: ${LLM_MAX_TOKENS_REPAIR:-420}
      RESPONSE_CACHE_TTL_SEC: ${RESPONSE_CACHE_TTL_SEC:-300}
      STYLE_EXAMPLES_CACHE_TTL_SEC: ${STYLE_EXAMPLES_CACHE_TTL_SEC:-300}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-20}
      STRICT_QA_ONLY: ${STRICT_QA_ONLY:-false}
      STRICT_QA_MODES: ${STRICT_QA_MODES:-helpdesk,references}
      STRICT_QA_SOURCE_TYPES: ${STRICT_QA_SOURCE_TYPES:-custom_qa}
      STRICT_QA_MIN_CHUNKS: ${STRICT_QA_MIN_CHUNKS:-1}
      STRICT_QA_MAX_DISTANCE: ${STRICT_QA_MAX_DISTANCE:-0.45}
      STRICT_QA_MIN_TOKEN_OVERLAP: ${STRICT_QA_MIN_TOKEN_OVERLAP:-0.4}
      STRICT_QA_LOOKUP_TTL_SEC: ${STRICT_QA_LOOKUP_TTL_SEC:-300}
      STRICT_QA_REFUSE_MESSAGE: "${STRICT_QA_REFUSE_MESSAGE:-Cau hoi nam ngoai bo du lieu da duoc phe duyet. Vui long lien he admin de bo sung.}"
    ports:
      - "8090:8090"
    networks:
      - elearning-network

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai-worker
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      APP_ENV: development
      PG_HOST: database
      PG_PORT: "5432"
      PG_DB: elearning
      PG_USER: directus
      PG_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      AI_INTERNAL_KEY: ${AI_INTERNAL_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL}
      LLM_MAX_TOKENS_HELPDESK: ${LLM_MAX_TOKENS_HELPDESK:-320}
      LLM_MAX_TOKENS_REFERENCES: ${LLM_MAX_TOKENS_REFERENCES:-360}
      LLM_MAX_TOKENS_MENTOR: ${LLM_MAX_TOKENS_MENTOR:-260}
      LLM_MAX_TOKENS_ASSIGNMENT: ${LLM_MAX_TOKENS_ASSIGNMENT:-320}
      LLM_MAX_TOKENS_REPAIR: ${LLM_MAX_TOKENS_REPAIR:-420}
      RESPONSE_CACHE_TTL_SEC: ${RESPONSE_CACHE_TTL_SEC:-300}
      STYLE_EXAMPLES_CACHE_TTL_SEC: ${STYLE_EXAMPLES_CACHE_TTL_SEC:-300}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-20}
      STRICT_QA_ONLY: ${STRICT_QA_ONLY:-false}
      STRICT_QA_MODES: ${STRICT_QA_MODES:-helpdesk,references}
      STRICT_QA_SOURCE_TYPES: ${STRICT_QA_SOURCE_TYPES:-custom_qa}
      STRICT_QA_MIN_CHUNKS: ${STRICT_QA_MIN_CHUNKS:-1}
      STRICT_QA_MAX_DISTANCE: ${STRICT_QA_MAX_DISTANCE:-0.45}
      STRICT_QA_MIN_TOKEN_OVERLAP: ${STRICT_QA_MIN_TOKEN_OVERLAP:-0.4}
      STRICT_QA_LOOKUP_TTL_SEC: ${STRICT_QA_LOOKUP_TTL_SEC:-300}
      STRICT_QA_REFUSE_MESSAGE: "${STRICT_QA_REFUSE_MESSAGE:-Cau hoi nam ngoai bo du lieu da duoc phe duyet. Vui long lien he admin de bo sung.}"
    networks:
      - elearning-network

volumes:
  pgdata:
  redisdata:
  ollama_data:

networks:
  elearning-network:
    driver: bridge
